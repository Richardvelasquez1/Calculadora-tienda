<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Dólar BCV</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --success-color: #198754;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .result-card {
            background-color: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            margin-top: 20px;
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .status-message {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .manual-panel {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
        }

        button {
            width: 100%;
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #157347;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Historial de Tasa Dólar BCV</h1>
        
        <div class="form-group">
            <label for="bcv-date">Selecciona una Fecha:</label>
            <input type="date" id="bcv-date">
        </div>

        <div class="result-card">
            <div id="date-title">Tasa del Día</div>
            <div class="price" id="usd-rate">--,-- Bs</div>
            <div class="status-message" id="status-msg">Iniciando aplicación...</div>
        </div>

        <div class="manual-panel">
            <div class="form-group">
                <label for="manual-rate">¿Fallo el servidor? Guarda la tasa manualmente:</label>
                <input type="number" id="manual-rate" step="0.01" placeholder="Ej: 45.32">
            </div>
            <button id="save-btn">Guardar en Historial</button>
        </div>
    </div>

    <script>
        const dateInput = document.getElementById('bcv-date');
        const usdRateDisplay = document.getElementById('usd-rate');
        const dateTitle = document.getElementById('date-title');
        const statusMsg = document.getElementById('status-msg');
        const manualRateInput = document.getElementById('manual-rate');
        const saveBtn = document.getElementById('save-btn');

        // URLs actualizadas de consulta
        const PRIMARY_API = 'https://dolarapi.com/v1/dolares/bcv';
        const BACKUP_API = 'https://ve.fxratesapi.com/v1/rates/latest?base=USD';

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            dateInput.max = today;

            // Intentar cargar automáticamente
            fetchRateWithFallback(today);
        });

        dateInput.addEventListener('change', (e) => {
            displayRateForDate(e.target.value);
        });

        // Evento para guardar manualmente el valor introducido por el usuario
        saveBtn.addEventListener('click', () => {
            const selectedDate = dateInput.value;
            const manualValue = parseFloat(manualRateInput.value);

            if (!selectedDate) {
                alert("Por favor, selecciona una fecha válida.");
                return;
            }
            if (isNaN(manualValue) || manualValue <= 0) {
                alert("Por favor, introduce un precio válido para el dólar.");
                return;
            }

            // Guardar el dato manual en el LocalStorage
            saveAndRender(selectedDate, manualValue, "Guardado manualmente por el usuario");
            manualRateInput.value = ""; // Limpiar el input
        });

        async function fetchRateWithFallback(dateKey) {
            statusMsg.textContent = "Buscando tasa en línea (Intento 1)...";
            
            try {
                const response = await fetch(PRIMARY_API);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const rate = data.promedio || data.venta;
                
                if (!rate) throw new Error();
                saveAndRender(dateKey, rate, "Tasa obtenida (API Principal)");

            } catch (e) {
                console.warn("Fallo API Principal, intentando respaldo...");
                statusMsg.textContent = "Buscando tasa en línea (Intento 2)...";

                try {
                    const response = await fetch(BACKUP_API);
                    if (!response.ok) throw new Error();
                    
                    const data = await response.json();
                    const rate = data.rates && data.rates.VES ? data.rates.VES : null;

                    if (!rate) throw new Error();
                    saveAndRender(dateKey, rate, "Tasa obtenida (Servidor Respaldo)");

                } catch (err) {
                    console.error("Ambas APIs caídas.");
                    // Si todo falla de red, leemos el historial local
                    displayRateForDate(dateKey);
                }
            }
        }

        function saveAndRender(dateKey, rate, successMessage) {
            let history = JSON.parse(localStorage.getItem('bcv_history')) || {};
            history[dateKey] = rate;
            localStorage.setItem('bcv_history', JSON.stringify(history));

            if (dateInput.value === dateKey) {
                renderRate(dateKey, rate, successMessage);
            }
        }

        function displayRateForDate(date) {
            const formattedDate = date.split('-').reverse().join('/');
            dateTitle.textContent = `Tasa del: ${formattedDate}`;

            const history = JSON.parse(localStorage.getItem('bcv_history')) || {};

            if (history[date]) {
                renderRate(date, history[date], "Datos recuperados del historial local");
            } else {
                usdRateDisplay.textContent = "--,-- Bs";
                statusMsg.textContent = "Servidores caídos. Introduce el valor abajo para guardarlo en esta fecha.";
            }
        }

        function renderRate(date, rate, message) {
            usdRateDisplay.textContent = `${Number(rate).toFixed(2).replace('.', ',')} Bs`;
            statusMsg.textContent = message;
        }
    </script>
</body>
</html>
