<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Dólar BCV</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
        }

        .result-card {
            background-color: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            margin-top: 20px;
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .status-message {
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Historial de Tasa Dólar BCV</h1>
        
        <div class="form-group">
            <label for="bcv-date">Selecciona una Fecha:</label>
            <input type="date" id="bcv-date">
        </div>

        <div class="result-card">
            <div id="date-title">Tasa del Día</div>
            <div class="price" id="usd-rate">--,-- Bs</div>
            <div class="status-message" id="status-msg">Cargando datos...</div>
        </div>
    </div>

    <script>
        // Elementos del DOM
        const dateInput = document.getElementById('bcv-date');
        const usdRateDisplay = document.getElementById('usd-rate');
        const dateTitle = document.getElementById('date-title');
        const statusMsg = document.getElementById('status-msg');

        // URL de la API alternativa para el BCV sin problemas de CORS
        const API_URL = 'https://dolarapi.com/v1/dover/bcv';

        // Al cargar la página de forma inicial
        document.addEventListener('DOMContentLoaded', () => {
            // Establecer la fecha de hoy en el calendario en formato YYYY-MM-DD
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            
            // Bloquear fechas futuras en el calendario
            dateInput.max = today;

            // Consultar la tasa de hoy
            fetchAndStoreRate(today);
        });

        // Evento que detecta cuando cambias de fecha en el calendario
        dateInput.addEventListener('change', (e) => {
            const selectedDate = e.target.value;
            displayRateForDate(selectedDate);
        });

        // Función que descarga la tasa actual y la guarda en LocalStorage
        async function fetchAndStoreRate(dateKey) {
            try {
                statusMsg.textContent = "Buscando tasa oficial en tiempo real...";
                const response = await fetch(API_URL);
                
                if (!response.ok) throw new Error("Error en la conexión a la API");
                
                const data = await response.json();
                
                // Extraemos el valor del campo "venta" o "promedio" de la respuesta
                const rate = data.venta || data.promedio;

                if (rate) {
                    // Obtener el historial existente del localStorage o crear uno nuevo
                    let history = JSON.parse(localStorage.getItem('bcv_history')) || {};
                    
                    // Guardamos la tasa asociándola a la fecha de hoy
                    history[dateKey] = rate;
                    localStorage.setItem('bcv_history', JSON.stringify(history));

                    // Mostrar en pantalla si sigue seleccionada esa fecha
                    if (dateInput.value === dateKey) {
                        renderRate(dateKey, rate, "Tasa actualizada desde BCV");
                    }
                }
            } catch (error) {
                console.error("Error al obtener datos:", error);
                // Si falla el fetch, intentamos ver si ya teníamos algo guardado localmente
                displayRateForDate(dateKey);
            }
        }

        // Función para mostrar la tasa basándose en la fecha seleccionada
        function displayRateForDate(date) {
            // Formatear la fecha para vista amigable (DD/MM/YYYY)
            const formattedDate = date.split('-').reverse().join('/');
            dateTitle.textContent = `Tasa del: ${formattedDate}`;

            // Obtener el historial guardado en LocalStorage
            const history = JSON.parse(localStorage.getItem('bcv_history')) || {};

            if (history[date]) {
                // Si la fecha existe en nuestra base de datos local
                renderRate(date, history[date], "Datos recuperados del historial local");
            } else {
                // Si la fecha va hacia atrás y no la guardamos en su momento
                usdRateDisplay.textContent = "--,-- Bs";
                statusMsg.textContent = "No hay registros guardados para esta fecha en el historial local.";
            }
        }

        // Helper para actualizar los textos en el HTML
        function renderRate(date, rate, message) {
            usdRateDisplay.textContent = `${Number(rate).toFixed(2).replace('.', ',')} Bs`;
            statusMsg.textContent = message;
        }
    </script>
</body>
</html>
