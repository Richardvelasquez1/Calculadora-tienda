<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Dólar BCV</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
        }

        .result-card {
            background-color: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
            margin-top: 20px;
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .status-message {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Historial de Tasa Dólar BCV hoy</h1>
        
        <div class="form-group">
            <label for="bcv-date">Selecciona una Fecha:</label>
            <input type="date" id="bcv-date">
        </div>

        <div class="result-card">
            <div id="date-title">Tasa del Día</div>
            <div class="price" id="usd-rate">--,-- Bs</div>
            <div class="status-message" id="status-msg">Iniciando aplicación...</div>
        </div>
    </div>

    <script>
        // Elementos de la interfaz (DOM)
        const dateInput = document.getElementById('bcv-date');
        const usdRateDisplay = document.getElementById('usd-rate');
        const dateTitle = document.getElementById('date-title');
        const statusMsg = document.getElementById('status-msg');

        // URLs de las APIs (Estrategia de Respaldo)
        const PRIMARY_API = 'https://dolarapi.com/v1/dolares/bcv'; 
        const BACKUP_API = 'https://ve.fxratesapi.com/v1/rates/latest?base=USD';

        // Al iniciar la aplicación
        document.addEventListener('DOMContentLoaded', () => {
            // Obtener la fecha local de hoy en formato YYYY-MM-DD
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            dateInput.max = today; // Evita que se elijan fechas futuras

            // Buscar la tasa del día de hoy
            fetchRateWithFallback(today);
        });

        // Detectar cambios en el calendario
        dateInput.addEventListener('change', (e) => {
            const selectedDate = e.target.value;
            displayRateForDate(selectedDate);
        });

        // Lógica de consulta asíncrona con Plan A y Plan B
        async function fetchRateWithFallback(dateKey) {
            statusMsg.textContent = "Buscando tasa oficial (Intento 1)...";
            
            try {
                // INTENTO 1: API Principal
                const response = await fetch(PRIMARY_API);
                if (!response.ok) throw new Error("API Principal no disponible");
                
                const data = await response.json();
                // DolarApi entrega un campo llamado "promedio" para el BCV
                const rate = data.promedio || data.venta;
                
                if (!rate) throw new Error("Datos inválidos en API Principal");
                
                saveAndRender(dateKey, rate, "Tasa obtenida con éxito (API Principal)");

            } catch (primaryError) {
                console.warn("Fallo la API principal, intentando con el respaldo...", primaryError);
                statusMsg.textContent = "API principal no responde. Conectando al respaldo...";

                try {
                    // INTENTO 2: API de Respaldo
                    const response = await fetch(BACKUP_API);
                    if (!response.ok) throw new Error("API de Respaldo no disponible");
                    
                    const data = await response.json();
                    // fxratesapi devuelve las tasas de cambio en el objeto "rates"
                    const rate = data.rates && data.rates.VES ? data.rates.VES : null;

                    if (!rate) throw new Error("Datos inválidos en API Respaldo");

                    saveAndRender(dateKey, rate, "Tasa obtenida con éxito (Servidor Respaldo)");

                } catch (backupError) {
                    console.error("Ambas APIs fallaron:", backupError);
                    // Si no hay internet o caen ambas, leemos lo que esté guardado localmente
                    displayRateForDate(dateKey);
                    statusMsg.textContent = "Sin conexión a servidores. Mostrando historial local.";
                }
            }
        }

        // Guarda en LocalStorage y actualiza la pantalla
        function saveAndRender(dateKey, rate, successMessage) {
            let history = JSON.parse(localStorage.getItem('bcv_history')) || {};
            
            // Guardamos el precio del dólar asociado a la fecha
            history[dateKey] = rate;
            localStorage.setItem('bcv_history', JSON.stringify(history));

            // Si el usuario no ha cambiado de fecha mientras cargaba, mostramos el resultado
            if (dateInput.value === dateKey) {
                renderRate(dateKey, rate, successMessage);
            }
        }

        // Muestra la tasa del historial para la fecha seleccionada
        function displayRateForDate(date) {
            const formattedDate = date.split('-').reverse().join('/');
            dateTitle.textContent = `Tasa del: ${formattedDate}`;

            const history = JSON.parse(localStorage.getItem('bcv_history')) || {};

            if (history[date]) {
                renderRate(date, history[date], "Datos recuperados de la memoria local");
            } else {
                usdRateDisplay.textContent = "--,-- Bs";
                statusMsg.textContent = "No hay registros previos para esta fecha en este dispositivo.";
            }
        }

        // Formatea el número y actualiza el texto final
        function renderRate(date, rate, message) {
            usdRateDisplay.textContent = `${Number(rate).toFixed(2).replace('.', ',')} Bs`;
            statusMsg.textContent = message;
        }
    </script>
</body>
</html>
